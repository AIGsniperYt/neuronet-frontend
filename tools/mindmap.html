<style>
  .mindmap-shell {
    display: grid;
    grid-template-columns: 1fr 0fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  ::-webkit-scrollbar,
  ::-webkit-scrollbar-track,
  ::-webkit-scrollbar-thumb {
    display: none;
  }

  html, body, * {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .mindmap-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: rgba(10,30,22,0.85);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .mindmap-header h2 {
    color: var(--accent);
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0;
  }

  .mindmap-header p {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin: 0;
    flex: 1;
  }

  .stats-bar {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .stat-pill {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    font-size: 0.8rem;
  }

  .stat-pill strong {
    color: var(--accent);
    font-size: 1rem;
    line-height: 1;
  }

  .stat-pill .stat-label {
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  .blueprint-area {
    position: relative;
    background: 
      linear-gradient(rgba(44, 255, 179, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44, 255, 179, 0.03) 1px, transparent 1px),
      linear-gradient(rgba(10, 30, 22, 0.95), rgba(7, 18, 13, 0.98));
    background-size: 40px 40px, 40px 40px, 100% 100%;
    border: 1px solid rgba(44, 255, 179, 0.15);
    overflow: hidden;
  }

  .blueprint-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(44, 255, 179, 0.02), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #mindmapCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    cursor: default;
  }

  .node-point.source {
    border-color: #4da6ff;
  }

  .node-point.quote {
    border-color: #ff9b39;
  }

  .node-point.analysis {
    border-color: #2cffb3;
  }

  .node-point:hover {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 12px currentColor;
  }

  .node-point.selected {
    transform: translate(-50%, -50%) scale(1.4);
    box-shadow: 0 0 16px currentColor;
  }

  .node-label {
    position: absolute;
    pointer-events: none;
    font-size: 0.75rem;
    color: rgba(230, 255, 245, 0.7);
    white-space: nowrap;
    transform: translate(-50%, -30px);
    z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .node-sidebar {
    position: fixed;
    top: 0;
    right: 0;
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    background: rgba(10, 30, 22, 0.98);
    border-left: 1px solid rgba(44, 255, 179, 0.2);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(20px);
  }

  .node-sidebar.open {
    transform: translateX(0);
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 4px;
  }

  .sidebar-type {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--accent);
  }

  .sidebar-close {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.2rem;
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .sidebar-close:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text-main);
  }

  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .content-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .content-text {
    line-height: 1.7;
    color: rgba(230, 255, 245, 0.9);
    font-size: 0.95rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .sidebar-actions {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-shrink: 0;
    gap: 12px;
  }

  .sidebar-actions .btn {
    flex: 1;
  }

  .btn {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.05);
    color: #e6fff5;
    cursor: pointer;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .btn:hover {
    border-color: rgba(44, 255, 179, 0.45);
    background: rgba(44, 255, 179, 0.08);
  }

  .btn.primary {
    background: linear-gradient(130deg, rgba(44, 255, 179, 0.24), rgba(44, 255, 179, 0.11));
    border-color: rgba(44, 255, 179, 0.45);
  }

  .btn.primary:hover {
    background: linear-gradient(130deg, rgba(44, 255, 179, 0.32), rgba(44, 255, 179, 0.18));
  }

  .btn.danger {
    border-color: rgba(255, 107, 107, 0.4);
    color: #ff6b6b;
  }

  .btn.danger:hover {
    background: rgba(255, 107, 107, 0.15);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.9rem;
    max-width: 250px;
  }
</style>

<div class="mindmap-shell">
  <div class="mindmap-header">
    <h2>Mindmap</h2>
    <p>Visualize connections between your knowledge nodes</p>
    <div class="stats-bar">
      <div class="stat-pill">
        <strong id="totalNodes">0</strong>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-pill">
        <strong id="totalSubjects">0</strong>
        <span class="stat-label">Subjects</span>
      </div>
      <div class="stat-pill">
        <strong id="totalSources">0</strong>
        <span class="stat-label">Sources</span>
      </div>
      <div class="stat-pill">
        <strong id="totalQuotes">0</strong>
        <span class="stat-label">Quotes</span>
      </div>
      <div class="stat-pill">
        <strong id="totalAnalyses">0</strong>
        <span class="stat-label">Analyses</span>
      </div>
      <div class="stat-pill">
        <strong id="totalConnections">0</strong>
        <span class="stat-label">Links</span>
      </div>
    </div>
  </div>

  <div class="blueprint-area" id="blueprintArea">
    <canvas id="mindmapCanvas"></canvas>
    
    <div id="emptyState" class="empty-state">
      <div class="empty-state-icon">🕸️</div>
      <p>No nodes yet. Add sources, quotes, and analyses to see your knowledge network.</p>
    </div>
  </div>
</div>

<div id="nodeSidebar" class="node-sidebar">
  <div class="sidebar-header">
    <div>
      <div id="sidebarTitle" class="sidebar-title"></div>
      <div id="sidebarType" class="sidebar-type"></div>
    </div>
    <button id="sidebarClose" class="sidebar-close">&times;</button>
  </div>
  
  <div class="sidebar-content">
    <div class="content-label">Content</div>
    <div id="fullContent" class="content-text"></div>
  </div>
  
  <div class="sidebar-actions">
    <button id="editNodeBtn" class="btn primary">Edit</button>
    <button id="deleteNodeBtn" class="btn danger">Delete</button>
  </div>
</div>
