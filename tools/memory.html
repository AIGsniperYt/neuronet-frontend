<div id="memoryTool">
  <div id="memoryHeader">
    <h1>Memory Tool</h1>
    <div id="memoryControls">
      <button id="modeSelect" class="memory-btn">Quote Learning</button>
      <button id="newSessionBtn" class="memory-btn">New Session</button>
      <button id="statsBtn" class="memory-btn">Stats</button>
    </div>
  </div>
  
  <div id="memoryContent">
    <!-- Flashcard Display -->
    <div id="flashcardContainer">
      <div id="flashcard" class="flashcard">
        <div id="flashcardFront" class="flashcard-face">
          <div id="flashcardContent">
            <!-- Content will be dynamically inserted here -->
          </div>
        </div>
        <div id="flashcardBack" class="flashcard-face">
          <div id="flashcardBackContent">
            <!-- Content will be dynamically inserted here -->
          </div>
        </div>
      </div>
      
      <div id="flashcardControls">
        <button id="flipBtn" class="memory-btn">Flip Card</button>
        <button id="prevBtn" class="memory-btn">Previous</button>
        <button id="nextBtn" class="memory-btn">Next</button>
        <button id="showAnalysisBtn" class="memory-btn">Show Analysis</button>
      </div>
    </div>
    
    <!-- Evidence Matching Mode -->
    <div id="evidenceMatchingContainer" style="display: none;">
      <h2>Evidence Matching</h2>
      <div id="evidencePrompt">
        <!-- Analysis node will be displayed here -->
      </div>
      <div id="quoteOptions">
        <!-- Quote options will be dynamically generated here -->
      </div>
      <div id="evidenceFeedback"></div>
    </div>
    
    <!-- Stats Panel -->
    <div id="memoryStats" style="display: none;">
      <h2>Memory Statistics</h2>
      <div id="statsContent"></div>
      <button id="closeStatsBtn" class="memory-btn">Close</button>
    </div>
  </div>
</div>
