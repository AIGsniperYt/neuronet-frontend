<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeuroNet</title>
<style>
:root {
  --bg-1: #0b1f17;
  --bg-2: #102b20;
  --panel-bg: rgba(16,43,32,0.6);
  --panel-strong: rgba(10,30,22,0.75);
  --glass-border: rgba(255,255,255,0.08);
  --accent: #2cffb3;
  --accent-soft: rgba(44,255,179,0.45);
  --accent-glow: rgba(44,255,179,0.35);
  --text-main: #e6fff5;
  --text-muted: rgba(230,255,245,0.65);
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  color: var(--text-main);
  background: radial-gradient(1200px 600px at 50% -10%, #143b2b, var(--bg-1));
  min-height:100vh;
  overflow-x:hidden;
}
canvas { position: fixed; inset:0; z-index:-1; }

#app {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

#sidebar {
  width: 240px;
  background: rgba(10,30,22,0.9);
  backdrop-filter: blur(14px);
  border-right: 1px solid rgba(255,255,255,0.08);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
}

#sidebar h2 {
  color: #2cffb3;
  margin-bottom: 28px;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 1px;
  padding-left: 8px;
}

.tool-btn {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 8px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: #e6fff5;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 500;
  text-align: left;
  transition: all 0.2s ease;
}

.tool-btn:hover {
  background: rgba(44,255,179,0.1);
  border-color: var(--accent-soft);
  transform: translateX(4px);
}

.tool-btn.active {
  background: rgba(44,255,179,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

#mainContent {
  flex: 1;
  padding: 32px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}

#toolContainer {
  max-width: 900px;
  margin: 0 auto;
}

/* Profile section in sidebar */
#sidebarProfile {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  gap: 12px;
}

#sidebarProfile img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  cursor: pointer;
}

#sidebarProfile span {
  color: var(--text-muted);
  font-size: 0.9rem;
}

#dropdown {
  position: absolute;
  bottom: 60px;
  left: 0;
  background: var(--panel-bg);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  overflow: hidden;
  backdrop-filter: blur(14px);
  min-width: 120px;
}

#logoutBtn {
  padding: 10px 16px;
  width: 100%;
  background: transparent;
  border: none;
  color: #ff6b6b;
  cursor: pointer;
  font-weight: 500;
  text-align: left;
}

#authActionBtn {
  padding: 10px 16px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-main);
  cursor: pointer;
  font-weight: 500;
  text-align: left;
}

#logoutBtn:hover,
#authActionBtn:hover {
  background: rgba(255,107,107,0.1);
}

@media (max-width: 700px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; padding: 16px; }
  #mainContent { padding: 20px; }
}
</style>
</head>
<body>

<canvas id="neuronet"></canvas>

<div id="app">
  <aside id="sidebar">
    <h2>NeuroNet</h2>
    <button class="tool-btn active" data-tool="analysis">✦ Analysis</button>
    <button class="tool-btn" data-tool="memory">🧠 Memory</button>
    <button class="tool-btn" data-tool="mindmap">🕸 Mindmap</button>
    <button class="tool-btn" data-tool="tracker">📊 Tracker</button>
    
    <div id="sidebarProfile">
      <img id="userPfp" src="" alt="Profile" style="position: relative;">
      <span id="userName">Loading...</span>
    </div>
    <div id="dropdown" style="display: none;">
      <button id="authActionBtn">Log In with Google</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </aside>

  <main id="mainContent">
    <div id="toolContainer">
    </div>
  </main>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
