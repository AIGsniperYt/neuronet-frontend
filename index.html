<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeuroNet</title>
<style>
:root {
  --bg-1: #0b1f17;
  --bg-2: #102b20;
  --panel-bg: rgba(16,43,32,0.6);
  --panel-strong: rgba(10,30,22,0.75);
  --glass-border: rgba(255,255,255,0.08);
  --accent: #2cffb3;
  --accent-soft: rgba(44,255,179,0.45);
  --accent-glow: rgba(44,255,179,0.35);
  --text-main: #e6fff5;
  --text-muted: rgba(230,255,245,0.65);
}

* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height: 100%;
}
body {
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  color: var(--text-main);
  background: radial-gradient(1200px 600px at 50% -10%, #143b2b, var(--bg-1));
  overflow: hidden;
}
/* Hide all scrollbars */
::-webkit-scrollbar,
::-webkit-scrollbar-track,
::-webkit-scrollbar-thumb {
  display: none;
}
* {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
canvas { position: fixed; inset:0; z-index:-1; }

/* Styles for linked analyses and quotes in flashcards */
.linked-analyses,
.linked-quotes {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.linked-analyses-title,
.linked-quotes-title {
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--accent-soft);
  font-size: 0.9rem;
}
.linked-analysis-item,
.linked-quote-item {
  background: rgba(44,255,179,0.08);
  border-left: 2px solid var(--accent-soft);
  padding: 8px 12px;
  margin-bottom: 6px;
  border-radius: 0 4px 4px 0;
  font-size: 0.9rem;
}
.linked-quote-source {
  font-size: 0.8rem;
  opacity: 0.8;
  margin-top: 4px;
  font-style: italic;
}

#app {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

#sidebar {
  width: 240px;
  background: rgba(10,30,22,0.9);
  backdrop-filter: blur(14px);
  border-right: 1px solid rgba(255,255,255,0.08);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
}

#sidebar h2 {
  color: #2cffb3;
  margin-bottom: 28px;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 1px;
  padding-left: 8px;
  cursor: pointer;
  user-select: none;
}

#sidebar,
#sidebar *,
#userName,
#toolButtonsContainer,
#toolButtonsContainer * {
  user-select: none;
}

#sidebar h2:hover {
  color: #5fffcf;
}

#mainContent {
  flex: 1;
  padding: 0;
  backdrop-filter: blur(4px);
  display: flex;
}

#toolContainer {
  width: 100%;
  height: 100%;
}

/* Tool button with pin icon */
.tool-btn-wrapper {
  position: relative;
  margin-bottom: 8px;
}

.tool-btn-wrapper,
.tool-btn,
.tool-pin-btn {
  user-select: none;
}

.tool-btn {
  width: 100%;
  padding: 14px 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: #e6fff5;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 500;
  text-align: left;
  transition: all 0.2s ease;
}

.tool-btn:hover {
  background: rgba(44,255,179,0.1);
  border-color: var(--accent-soft);
  transform: translateX(4px);
}

.tool-btn.active {
  background: rgba(44,255,179,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

.tool-pin-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  padding: 0;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s ease;
}

.tool-pin-btn:hover {
  color: var(--accent);
}

.tool-pin-btn.pinned {
  color: var(--accent);
}

/* Profile section in sidebar */
#sidebarProfile {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  gap: 12px;
}

#sidebarProfile img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  cursor: pointer;
}

#sidebarProfile span {
  color: var(--text-muted);
  font-size: 0.9rem;
}

#dropdown {
  position: absolute;
  bottom: 60px;
  left: 0;
  background: var(--panel-bg);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  overflow: hidden;
  backdrop-filter: blur(14px);
  min-width: 120px;
}

#logoutBtn {
  padding: 10px 16px;
  width: 100%;
  background: transparent;
  border: none;
  color: #ff6b6b;
  cursor: pointer;
  font-weight: 500;
  text-align: left;
}

#authActionBtn {
  padding: 10px 16px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-main);
  cursor: pointer;
  font-weight: 500;
  text-align: left;
}

#exportJsonBtn,
#importJsonBtn {
  padding: 10px 16px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text-main);
  cursor: pointer;
  font-weight: 500;
  text-align: left;
}
#analysisReader blockquote {
  margin-left: 2em;
}
#logoutBtn:hover,
#authActionBtn:hover,
#exportJsonBtn:hover,
#importJsonBtn:hover {
  background: rgba(255,107,107,0.1);
}

/* Launchpad styles */
.launchpad {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
  overflow-y: auto;
  user-select: none;
  width: 100%;
  box-sizing: border-box;
  align-content: start;
}

.launchpad > .panel {
  flex-shrink: 0;
}

.global-stats {
  margin-bottom: 8px;
}

.launchpad * {
  user-select: none;
}

.kicker {
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72rem;
  color: rgba(44, 255, 179, 0.75);
}

.btn {
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.05);
  color: #e6fff5;
  padding: 8px 14px;
  cursor: pointer;
  font: inherit;
  font-size: 0.85rem;
  transition: all 0.2s ease;
}

.btn:hover {
  border-color: rgba(44, 255, 179, 0.45);
  background: rgba(44, 255, 179, 0.08);
}

.btn.primary {
  background: linear-gradient(130deg, rgba(44, 255, 179, 0.24), rgba(44, 255, 179, 0.11));
  border-color: rgba(44, 255, 179, 0.45);
}

.btn.primary:hover {
  background: linear-gradient(130deg, rgba(44, 255, 179, 0.32), rgba(44, 255, 179, 0.18));
}

.inline-input {
  width: 100%;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(5, 18, 13, 0.85);
  color: #e6fff5;
  padding: 8px 10px;
  font: inherit;
  font-size: 0.85rem;
}

.inline-input:focus {
  outline: none;
  border-color: rgba(44, 255, 179, 0.45);
  box-shadow: 0 0 0 3px rgba(44, 255, 179, 0.08);
}

.icon-btn {
  width: 28px;
  height: 28px;
  min-width: 28px;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.04);
  color: #e6fff5;
  cursor: pointer;
  font: inherit;
  font-size: 1rem;
  transition: all 0.2s ease;
}

.icon-btn:hover {
  border-color: rgba(44, 255, 179, 0.45);
  background: rgba(44, 255, 179, 0.12);
}

.icon-btn.delete-btn {
  color: #ff6b6b;
}

.icon-btn.delete-btn:hover {
  background: rgba(255, 107, 107, 0.15);
  border-color: rgba(255, 107, 107, 0.45);
}

.empty-note {
  text-align: center;
  color: rgba(230, 255, 245, 0.65);
  padding: 14px;
}

.panel {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: linear-gradient(160deg, rgba(14, 34, 26, 0.88), rgba(9, 26, 19, 0.82));
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 22px 38px rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(6px);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(80px, 1fr));
  gap: 12px;
}

.stat-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  min-height: auto;
}

.stat-card strong {
  display: block;
  font-size: 1.2rem;
  color: var(--accent);
}

.stat-label {
  display: block;
  font-size: 0.8rem;
  color: rgba(230,255,245,0.65);
  margin-bottom: 4px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.subject-list,
.subject-create-row {
  display: grid;
  gap: 10px;
}

.subject-create-row {
  grid-template-columns: 1fr auto;
  margin-bottom: 14px;
}

.subject-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 14px 16px;
}

.subject-name {
  font-size: 1rem;
  font-weight: 600;
}

.subject-actions {
  display: flex;
  gap: 8px;
}

.tool-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.tool-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.tool-card:hover {
  border-color: var(--accent-soft);
  background: rgba(44,255,179,0.08);
}

.tool-card-icon {
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.tool-card-title {
  font-weight: 600;
  font-size: 1.1rem;
  margin-bottom: 4px;
}

.tool-card-desc {
  font-size: 0.85rem;
  color: rgba(230,255,245,0.65);
}

.tool-card-pin {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px;
}

.tool-card-pin:hover,
.tool-card-pin.pinned {
  color: var(--accent);
}

/* Modal styles */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-content {
  background: linear-gradient(160deg, rgba(14, 34, 26, 0.95), rgba(9, 26, 19, 0.95));
  border: 1px solid rgba(44, 255, 179, 0.25);
  border-radius: 16px;
  padding: 24px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
}

.modal-title {
  font-size: 1.25rem;
  margin-bottom: 12px;
  color: var(--accent);
}

.modal-desc {
  color: rgba(230, 255, 245, 0.85);
  line-height: 1.5;
  margin-bottom: 20px;
}

.modal-desc strong {
  color: var(--text-main);
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn-danger {
  background: rgba(255, 77, 77, 0.2);
  border-color: rgba(255, 77, 77, 0.5);
  color: #ff6b6b;
}

.btn-danger:hover {
  background: rgba(255, 77, 77, 0.3);
  border-color: #ff6b6b;
}

@media (max-width: 700px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; padding: 16px; }
  #mainContent { padding: 20px; }
}
</style>
</head>
<body>

<canvas id="neuronet"></canvas>

<div id="app">
  <aside id="sidebar">
    <h2 id="logo" style="cursor: pointer;">NeuroNet</h2>
    <div id="toolButtonsContainer"></div>
    
    <div id="sidebarProfile">
      <img id="userPfp" src="" alt="Profile" style="position: relative;">
      <span id="userName">Loading...</span>
    </div>
    <div id="dropdown" style="display: none;">
      <button id="authActionBtn">Log In with Google</button>
      <button id="logoutBtn">Logout</button>
      <button id="exportJsonBtn">Export JSON Data</button>
      <button id="importJsonBtn">Import JSON Data</button>
      <input id="importJsonInput" type="file" accept=".json,application/json" hidden />
    </div>
  </aside>

  <!-- Unpin Confirmation Modal -->
  <div id="unpinModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 class="modal-title">Unpin Tool?</h3>
      <p class="modal-desc">This will remove <strong id="unpinToolName"></strong> from your sidebar. You can re-pin it anytime from the Tool Catalogue.</p>
      <div class="modal-actions">
        <button id="unpinCancel" class="btn">Cancel</button>
        <button id="unpinConfirm" class="btn btn-danger">Unpin</button>
      </div>
    </div>
  </div>

  <main id="mainContent">
    <div id="toolContainer"></div>
    <!-- Global Launchpad (outside toolContainer) -->
    <div id="globalLaunchpad" class="launchpad" style="display: none;">
        <section class="panel global-stats" id="globalStats">
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-label">Subjects</span>
              <strong id="statSubjects">0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">Sources</span>
              <strong id="statSources">0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">Quotes</span>
              <strong id="statQuotes">0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">Analyses</span>
              <strong id="statAnalyses">0</strong>
            </div>
          </div>
        </section>

        <section class="panel subjects-section">
          <div class="section-header">
            <h3 class="kicker">Subjects</h3>
            <button id="toggleSubjectEdit" class="btn" type="button">Edit</button>
          </div>
          <div class="subject-create-row">
            <input id="newSubjectName" class="inline-input" type="text" placeholder="New subject name" maxlength="80" />
            <button id="addSubjectBtn" class="btn primary" type="button">+ Add</button>
          </div>
          <div id="subjectList" class="subject-list"></div>
        </section>

        <section class="panel tool-catalogue">
          <h3 class="kicker">Tool Catalogue</h3>
          <div id="toolCardsGrid" class="tool-cards-grid"></div>
        </section>
    </div>
  </main>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
