<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeuroNet</title>
<style>
:root {
  --bg-1: #0b1f17;
  --bg-2: #102b20;
  --panel-bg: rgba(16,43,32,0.6);
  --panel-strong: rgba(10,30,22,0.75);
  --glass-border: rgba(255,255,255,0.08);
  --accent: #2cffb3;
  --accent-soft: rgba(44,255,179,0.45);
  --accent-glow: rgba(44,255,179,0.35);
  --text-main: #e6fff5;
  --text-muted: rgba(230,255,245,0.65);
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  color: var(--text-main);
  background: radial-gradient(1200px 600px at 50% -10%, #143b2b, var(--bg-1));
  min-height:100vh;
  overflow-x:hidden;
}
canvas { position: fixed; inset:0; z-index:-1; }

header {
  text-align:center; padding:64px 24px 32px; position:relative;
}
header h1 { font-size:clamp(2.4rem,5vw,3.2rem); font-weight:800; color:var(--accent); letter-spacing:1px; }
header p { margin-top:12px; color:var(--text-muted); }

.profile {
  position:absolute; top:20px; right:20px; display:flex; align-items:center; gap:10px;
}
.profile img {
  width:40px; height:40px; border-radius:50%; border:2px solid var(--accent);
}
.profile button {
  background:var(--panel-bg); border:1px solid var(--glass-border);
  color:var(--accent); padding:6px 12px; border-radius:8px; cursor:pointer;
}

.dashboard {
  max-width:1200px; margin:0 auto; padding:40px 24px 80px;
  display:grid; grid-template-columns:1.2fr 0.8fr; gap:32px;
}
.panel {
  background: var(--panel-bg);
  border:1px solid var(--glass-border);
  border-radius:20px; padding:28px;
  backdrop-filter: blur(14px);
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.panel h2 { font-size:1.4rem; margin-bottom:20px; color: var(--accent); }

.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.stat { background:var(--panel-strong); border-radius:16px; padding:22px; text-align:center; border:1px solid var(--glass-border); }
.stat span { display:block; font-size:0.9rem; color:var(--text-muted); }
.stat strong { font-size:2rem; font-weight:800; color:var(--accent); }

.actions { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.action {
  height:140px; background:var(--panel-bg); border:1px solid var(--glass-border);
  border-radius:18px; display:flex; align-items:center; justify-content:center;
  text-decoration:none; color:var(--accent); font-size:1.1rem; font-weight:700;
  transition: transform .25s ease, box-shadow .25s ease;
}
.action:hover { transform:translateY(-6px); box-shadow:0 0 30px var(--accent-glow); }

.activity { display:flex; flex-direction:column; gap:16px; }
.log { padding:16px 18px; background:var(--panel-strong); border-radius:14px; border:1px solid var(--glass-border); font-size:0.95rem; color:var(--text-muted); }

#quoteInput { width:100%; padding:12px; margin-top:16px; border-radius:10px; border:none; background:var(--panel-strong); color:var(--text-main); }
#saveQuoteBtn { margin-top:8px; padding:10px 16px; border:none; border-radius:8px; background:var(--accent); color:var(--bg-1); cursor:pointer; }
#quotesList { margin-top:12px; list-style:none; padding-left:0; }

#themeToggle {
  position:fixed; top:20px; right:90px; z-index:10;
  background:var(--panel-bg); border:1px solid var(--glass-border);
  color:var(--accent); padding:10px 16px; border-radius:12px;
  cursor:pointer; font-weight:700;
}

@media (max-width:900px) { .dashboard { grid-template-columns:1fr; } }
</style>
</head>
<body>

<canvas id="neuronet"></canvas>

<!-- Top-right profile -->
<div id="userMenu" style="position:fixed; top:20px; right:20px; z-index:10;">
  <img id="userPfp" src="" alt="Profile" style="width:48px; height:48px; border-radius:50%; cursor:pointer; border:2px solid var(--accent);">
  <div id="dropdown" style="display:none; position:absolute; right:0; margin-top:8px; background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:8px; overflow:hidden;">
    <button id="logoutBtn" style="padding:8px 12px; width:100%; background:transparent; border:none; color:var(--accent); cursor:pointer;">Logout</button>
  </div>
</div>

<button id="themeToggle">Toggle Theme</button>

<header>
  <h1>NeuroNet</h1>
  <p>Study like a grade 9 student</p>
</header>

<section class="dashboard">
  <div class="panel">
    <h2>Today’s Snapshot</h2>
    <div class="stats">
      <div class="stat"><strong id="cards-reviewed">27</strong><span>Cards Reviewed</span></div>
      <div class="stat"><strong id="accuracy">82%</strong><span>Accuracy</span></div>
      <div class="stat"><strong id="sessions">4</strong><span>Sessions</span></div>
    </div>
    <input id="quoteInput" placeholder="Write a thought..." />
    <button id="saveQuoteBtn">Save</button>
    <ul id="quotesList"></ul>
  </div>

  <div class="panel">
    <h2>Quick Actions</h2>
    <div class="actions">
      <a class="action" href="#" id="flashcards">Flashcards</a>
      <a class="action" href="#" id="tracker">Tracker</a>
      <a class="action" href="#" id="past-papers">Past Papers</a>
      <a class="action" href="#" id="add-question">Add Question</a>
    </div>
  </div>

  <div class="panel" style="grid-column:1 / -1;">
    <h2>Recent Activity</h2>
    <div class="activity" id="recent-activity"></div>
  </div>
</section>

<script>
const canvas = document.getElementById("neuronet");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Node background animation ---
let nodes=[], nodeCount=92, maxDist=150, separationStrength=0.02, edgeRepulsionStrength=0.01, edgeBuffer=50;
const cellSize=maxDist; let grid={}, gridWidth, gridHeight;

function resetGrid(){ grid={}; gridWidth=Math.ceil(canvas.width/cellSize); gridHeight=Math.ceil(canvas.height/cellSize); }
function getCellIndex(x,y){ return `${Math.floor(x/cellSize)},${Math.floor(y/cellSize)}`; }

class Node{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.vx=(Math.random()-0.5)*1.2;
    this.vy=(Math.random()-0.5)*1.2;
    this.maxConnections=Math.floor(Math.random()*3)+3;
    this.radius=2+Math.random()*2;
  }
  update(){
    let moveX=0, moveY=0;
    const cellX=Math.floor(this.x/cellSize), cellY=Math.floor(this.y/cellSize);
    let nearbyNodes=[];
    for(let dx=-1;dx<=1;dx++){ for(let dy=-1;dy<=1;dy++){
      const key=`${cellX+dx},${cellY+dy}`;
      if(grid[key]) nearbyNodes.push(...grid[key]);
    }}
    for(let other of nearbyNodes){
      if(other===this) continue;
      let dx=other.x-this.x, dy=other.y-this.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>0.01 && dist<maxDist){
        let force=separationStrength*(1/dist)*(1-dist/maxDist);
        moveX-=dx*force; moveY-=dy*force;
      }
    }
    if(this.x<edgeBuffer) moveX+=edgeRepulsionStrength*(1-this.x/edgeBuffer);
    if(this.x>canvas.width-edgeBuffer) moveX-=edgeRepulsionStrength*((this.x-(canvas.width-edgeBuffer))/edgeBuffer);
    if(this.y<edgeBuffer) moveY+=edgeRepulsionStrength*(1-this.y/edgeBuffer);
    if(this.y>canvas.height-edgeBuffer) moveY-=edgeRepulsionStrength*((this.y-(canvas.height-edgeBuffer))/edgeBuffer);
    const mouseForceRadius=50, mouseRepelStrength=0.5;
    if(mouse.x!==undefined && mouse.y!==undefined){
      let dx=this.x-mouse.x, dy=this.y-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<mouseForceRadius && dist>0.01){
        let force=mouseRepelStrength*(1-dist/mouseForceRadius);
        moveX+=(dx/dist)*force; moveY+=(dy/dist)*force;
      }
    }
    const randomDrift=0.02;
    this.vx+=moveX+(Math.random()-0.5)*randomDrift;
    this.vy+=moveY+(Math.random()-0.5)*randomDrift;
    const maxSpeed=0.6;
    let speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(speed>maxSpeed){ this.vx=(this.vx/speed)*maxSpeed; this.vy=(this.vy/speed)*maxSpeed; }
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0){ this.x=0; this.vx*=-1; }
    if(this.x>canvas.width){ this.x=canvas.width; this.vx*=-1; }
    if(this.y<0){ this.y=0; this.vy*=-1; }
    if(this.y>canvas.height){ this.y=canvas.height; this.vy*=-1; }
  }
  draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle="#9fffd6"; ctx.fill(); }
}

function buildGrid(){ resetGrid(); for(const node of nodes){ const key=getCellIndex(node.x,node.y); if(!grid[key]) grid[key]=[]; grid[key].push(node); } }
function connectNodes(){
  buildGrid();
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    const cellX=Math.floor(a.x/cellSize), cellY=Math.floor(a.y/cellSize);
    let candidates=[];
    for(let dx=-1;dx<=1;dx++){ for(let dy=-1;dy<=1;dy++){
      const key=`${cellX+dx},${cellY+dy}`;
      if(grid[key]) candidates.push(...grid[key]);
    }}
    candidates=candidates.filter(n=>n!==a).map(b=>{
      const dx=b.x-a.x, dy=b.y-a.y, dist=Math.sqrt(dx*dx+dy*dy);
      return {node:b,dist};
    });
    let neighbors=candidates.filter(c=>c.dist<maxDist);
    let farNeighbors=candidates.filter(c=>c.dist>=maxDist && c.dist<maxDist*2);
    neighbors.sort((n1,n2)=>n1.dist-n2.dist);
    farNeighbors.sort((n1,n2)=>n1.dist-n2.dist);
    neighbors=neighbors.slice(0,a.maxConnections);
    if(farNeighbors.length>0) neighbors.push(farNeighbors[0]);
    for(let {node:b, dist} of neighbors){
      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=`rgba(31,209,138,${0.5*(1-dist/maxDist)})`;
      ctx.lineWidth=1;
      ctx.stroke();
    }
  }
}

function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); nodes.forEach(n=>{ n.update(); n.draw(); }); connectNodes(); requestAnimationFrame(animate); }
function init(){ nodes=[]; resetGrid(); for(let i=0;i<nodeCount;i++) nodes.push(new Node()); animate(); }
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; init(); });

const mouse={};
canvas.addEventListener("mousemove", e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener("mouseleave", ()=>{ delete mouse.x; delete mouse.y; });

document.getElementById("themeToggle").addEventListener("click",()=>{ /* theme toggle code if needed */ });
document.addEventListener("DOMContentLoaded",()=>{ init(); });

// ---------------- User & Quotes ----------------
async function fetchUser() {
  try {
    const res = await fetch("/auth/user");
    if (!res.ok) throw new Error("Not logged in");
    const user = await res.json();
    console.log("Fetched user:", user); // <-- check this

    const pfp = document.getElementById("userPfp");
    pfp.src = user.picture || "/default-pfp.png";
    window.currentUser = user; // store user info
    return user;
  } catch {
    window.location.href = "/auth/google";
  }
}

// Dropdown toggle
const pfpElem = document.getElementById("userPfp");
const dropdown = document.getElementById("dropdown");
pfpElem.addEventListener("click", () => {
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
});

// Logout button
document.getElementById("logoutBtn").addEventListener("click", async () => {
  const res = await fetch("/auth/logout");
  if (res.ok) window.location.href = "/auth/google"; // redirect to login
});
async function loadQuotes(){
  const res = await fetch("/api/quotes");
  if(!res.ok) return;
  const quotes = await res.json();
  document.getElementById("quotesList").innerHTML = quotes.map(q=>`<li>${q.text}</li>`).join("");
}

document.getElementById("saveQuoteBtn").addEventListener("click", async ()=>{
  const text = document.getElementById("quoteInput").value.trim();
  if(!text) return;
  await fetch("/api/quotes", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({text})
  });
  document.getElementById("quoteInput").value="";
  loadQuotes();
});

(async()=>{
  await fetchUser();
  loadQuotes();
})();
</script>

</body>
</html>
